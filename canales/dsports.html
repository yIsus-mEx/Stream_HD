<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSports Prime</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <video id="video" controls autoplay playsinline></video>

    <script>
        // Tu enlace original que confirmas que funciona perfectamente
        const manifestUri = 'https://otte.live.fly.ww.aiv-cdn.net/gru-nitro/live/clients/dash/enc/x0srg3jjpz/out/v1/f779c49314394d61886d63f58d9d52e4/cenc.mpd';

        async function initApp() {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return;

            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // Configuramos las llaves ClearKey nativas
            player.configure({
                drm: {
                    clearKeys: {
                        '4f4c3a9912ea752e88f4497864a1bc8b': '278128004fe8c6ffb2cd2a0c154a241a'
                    }
                }
            });

            // TRUCO PHP / EXTENSIÓN: Modificamos la petición directamente en el cliente
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                // Solo modificamos cuando Shaka Player vaya a pedir el manifiesto o los segmentos de Amazon
                if (request.uris[0].includes('aiv-cdn.net')) {
                    // Forzamos las cabeceras exactas que la web autorizada envía
                    request.headers['Origin'] = 'https://latamplay1.click';
                    request.headers['Referer'] = 'https://latamplay1.click/';
                }
            });

            try {
                await player.load(manifestUri);
                console.log('¡Canal cargado con éxito localmente!');
            } catch (e) {
                console.error('Error al cargar el canal:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
