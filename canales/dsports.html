<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.14.1/dist/shaka-player.compiled.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; cursor: none; }
        video { width: 100%; height: 100%; background-color: #000; }
    </style>
</head>
<body>

    <video id="video" controls autoplay playsinline></video>

    <script>
        async function initPlayer() {
            shaka.polyfill.installAll();

            if (!shaka.Player.isBrowserSupported()) {
                return;
            }

            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            // URL directa y limpia sin ninguna alteración
            const manifestUri = 'https://otte.live.fly.ww.aiv-cdn.net/gru-nitro/live/clients/dash/enc/x0srg3jjpz/out/v1/f779c49314394d61886d63f58d9d52c4/cenc.mpd';

            player.configure({
                drm: {
                    clearKeys: {
                        '4f4c3a9912ea752c8bf4497b64a1bc0b': '278128004fc8c6ffb2cd2a0c154a241a'
                    }
                },
                streaming: {
                    retryParameters: { maxAttempts: 5 }
                }
            });

            try {
                await player.load(manifestUri, null, 'application/dash+xml');
                video.play();
            } catch (e) {
                console.error('Error al cargar Shaka:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
